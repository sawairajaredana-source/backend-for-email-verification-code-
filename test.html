<button onclick="send()">Send Email</button>

<script>
function send() {
  fetch("http://localhost:3000/send-otp", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: "sanjaydhandha912@gmail.com"
    })
  })
  .then(res => res.json())
  .then(data => alert(JSON.stringify(data)))
  .catch(err => alert(err));
}
</script>
